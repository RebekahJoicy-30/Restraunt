<!DOCTYPE html>
<html>
<head>
<title>Tasty Bites Restaurant</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: lightgray;
  text-align: center;
}
header {
  background: darkred;
  color: white;
  padding: 20px;
}
.banner img {
  width: 100%;
  height: 350px;
  object-fit: cover;
}
section {
  padding: 30px;
}
.slider img {
  width: 450px;
  height: 300px;
  object-fit: cover;
  border-radius: 10px;
}
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
.gallery img {
  width: 220px;
  height: 160px;
  margin: 10px;
  border-radius: 10px;
  object-fit: cover;
}
</style>
</head>
<body>

<header>
  <h1>Tasty Bites Restaurant</h1>
  <p>Delicious Flavors From Around the World</p>
</header>

<section class="banner">
  <img src="https://images.pexels.com/photos/262978/pexels-photo-262978.jpeg">
</section>

<section>
  <h2>Welcome</h2>
  <p>Experience the best dishes from multiple cuisines made by expert chefs.</p>
</section>

<section class="slider">
  <h2>Popular Dishes</h2>
  <img id="sliderImage" src="https://images.pexels.com/photos/70497/pexels-photo-70497.jpeg">
</section>

<section>
  <h2>Food Gallery</h2>
  <div class="gallery">
    <img src="https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg">
    <img src="https://images.pexels.com/photos/1639562/pexels-photo-1639562.jpeg">
    <img src="https://images.pexels.com/photos/1437267/pexels-photo-1437267.jpeg">
    <img src="https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg">
    <img src="https://images.pexels.com/photos/2347311/pexels-photo-2347311.jpeg">
    <img src="https://images.pexels.com/photos/2092906/pexels-photo-2092906.jpeg">
    <img src="https://images.pexels.com/photos/5737247/pexels-photo-5737247.jpeg">
    <img src="https://images.pexels.com/photos/4958792/pexels-photo-4958792.jpeg">
    <img src="https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg">
    <img src="https://images.pexels.com/photos/279708/pexels-photo-279708.jpeg">
  </div>
</section>

<script>
let images = [
  "https://images.pexels.com/photos/70497/pexels-photo-70497.jpeg",
  "https://images.pexels.com/photos/1639562/pexels-photo-1639562.jpeg",
  "https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg",
  "https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg",
  "https://images.pexels.com/photos/2347311/pexels-photo-2347311.jpeg"
];
let index = 0;
setInterval(function() {
  index++;
  if (index >= images.length) index = 0;
  document.getElementById("sliderImage").src = images[index];
}, 3000);
</script>

</body>
</html>
